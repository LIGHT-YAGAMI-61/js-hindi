

    <!DOCTYPE html>
    <html lang="en">
    <head>
        
        <title>BMI Calculator</title>
        <link rel="stylesheet" href="style.css">
    </head>
    
        <h1> BMI Calculator </h1>
    <body>
        <form>
        <p class="x"> <label > Height in CM : </label><input type="text" id="height"></p>
        <p class="x"><label> Weight in KG : </label><input type="text" id="weight"></p>

        <button class="x">Calculate</button>
        <div id="results"></div>
        <div id="weight-guide">
        <h3 class="x">BMI Weight Guide</h3>
        <p class="x">Under Weight = Less than 18.6 </p>
        <p class="x">Normal Range = 18.6 and 24.9 </p>
        <p class="x">Overweight = Greater than 24.9 </p>
        </div>
        </form>
    </body>
        <script src="logic.js"></script>
